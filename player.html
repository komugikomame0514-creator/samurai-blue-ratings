<!doctype html>
<html lang="ja"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>PLAYER | PROJECT YATAGARASU</title>
<link rel="stylesheet" href="css/common.css"><link rel="stylesheet" href="css/pages.css">
</head><body>
<header class="site-header"><nav class="site-nav">
<a class="brand" href="index.html"><img src="assets/logo/samurai-blue.png" alt=""><span>PROJECT YATAGARASU <small>GLOBAL FOOTBALL DATABASE</small></span></a>
<div class="nav-links"><a href="index.html">HOME</a><a class="active" href="index.html#players">PLAYER</a><a href="compare.html">COMPARE</a><a href="ranking.html">RANKING</a></div>
</nav></header>

<div class="player-shell">
<aside class="side-rail">
  <div class="side-brand"><img src="assets/logo/samurai-blue.png" alt=""><strong>YATAGARASU</strong><small>VER6.0 DATABASE</small></div>
  <nav class="side-menu">
    <a href="index.html"><span class="side-icon">⌂</span><span><b>HOME</b><small>ホーム</small></span></a>
    <a class="active" href="index.html#players"><span class="side-icon">◉</span><span><b>PLAYER</b><small>選手一覧</small></span></a>
    <a href="compare.html"><span class="side-icon">◌</span><span><b>COMPARE</b><small>選手比較</small></span></a>
    <a href="ranking.html"><span class="side-icon">▥</span><span><b>RANKING</b><small>ランキング</small></span></a>
    <a href="#"><span class="side-icon">♛</span><span><b>BEST XI</b><small>将来実装</small></span></a>
    <a href="#"><span class="side-icon">◎</span><span><b>WORLD</b><small>将来実装</small></span></a>
  </nav>
</aside>

<main class="player-main">
  <section class="player-hero">
    <div class="identity-card">
      <img id="photo" alt="">
      <div class="card-top">
        <div id="ovr" class="card-ovr"></div>
        <div id="position" class="card-pos"></div>
        <div class="card-badge"><span id="rarity"></span><span>JAPAN</span></div>
      </div>
      <div class="card-bottom">
        <h1 id="name"></h1><div id="english" class="en"></div><div id="birth" class="birth"></div>
        <div class="club-strip"><span id="clubName"></span><span id="number"></span></div>
      </div>
    </div>

    <div class="player-content">
      <section class="panel top-dashboard">
        <div class="stats-column">
          <h2>能力値 <span>15 ATTRIBUTE DATA</span></h2>
          <div id="longStats" class="long-stat-list"></div>
        </div>
        <div class="radar-zone">
          <div class="radar-overall"><small>OVERALL</small><b id="radarOvr"></b></div>
          <canvas id="radar"></canvas>
        </div>
      </section>

      <section class="panel ai-panel">
        <div class="ai-label"><i></i> AI SCOUT REPORT</div>
        <h2>AI総評</h2>
        <p id="aiReview" class="ai-review"></p>
        <div class="ai-grid">
          <div class="ai-metric"><span>BEST ROLE</span><b id="bestRole"></b></div>
          <div class="ai-metric"><span>IMPACT SCORE</span><b id="impactScore"></b></div>
          <div class="ai-metric"><span>GROWTH POTENTIAL</span><b id="growthPotential"></b></div>
          <div class="ai-metric"><span>KEY STRENGTHS</span><div id="keyStrengths" class="strength-list"></div></div>
        </div>
      </section>
    </div>
  </section>

  <section class="panel playstyle-panel">
    <h2 class="section-title">プレースタイル</h2>
    <p id="description" class="playstyle-text"></p>
    <div id="traits" class="trait-chips"></div>
  </section>

  <section id="profileGrid" class="profile-grid-v2"></section>
</main>
</div>

<script src="js/data.js"></script><script src="js/common.js"></script><script src="js/player-v6.js"></script>
</body></html>
