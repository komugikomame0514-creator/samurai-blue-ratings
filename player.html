<!doctype html>
<html lang="ja"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>PLAYER | PROJECT YATAGARASU</title>
<link rel="stylesheet" href="css/common.css"><link rel="stylesheet" href="css/pages.css">
</head><body>
<header class="site-header"><nav class="site-nav">
<a class="brand" href="index.html"><img src="assets/logo/samurai-blue.png" alt=""><span>PROJECT YATAGARASU <small>PLAYER PORTRAIT</small></span></a>
<div class="nav-links"><a href="index.html">HOME</a><a class="active" href="index.html#players">PLAYER</a><a href="compare.html">COMPARE</a><a href="ranking.html">RANKING</a></div>
</nav></header>

<main class="player-layout">
  <section class="player-photo-zone">
    <img id="photo" alt="">
    <div class="ovr-chip"><div><b id="ovr"></b><span>OVERALL</span></div></div>
    <div class="player-id">
      <div class="meta-line"><span id="position"></span><span id="rarity"></span><span>JAPAN</span></div>
      <h1 id="name"></h1>
      <div id="english" class="en"></div>
      <div class="clubline"><span id="clubName"></span><span id="number"></span></div>
    </div>
  </section>

  <section class="attribute-zone">
    <div class="kicker">ATTRIBUTE ANALYSIS</div>
    <h2>能力分析</h2>
    <div class="subhead">純粋に数値と得意分野を分析</div>
    <div class="attribute-card"><canvas id="radar"></canvas></div>
    <div id="statStack" class="stat-stack"></div>
  </section>

  <section class="scout-zone">
    <div class="kicker">AI SCOUT REPORT</div>
    <h2>選手総評</h2>
    <div class="subhead">役割・適性・将来性・試合への影響を評価</div>

    <article class="scout-report">
      <div class="ai-tag">PROJECT YATAGARASU AI ANALYSIS</div>
      <h3 id="bestRole"></h3>
      <p id="aiReview"></p>
      <div class="scout-metrics">
        <div class="scout-metric"><span>IMPACT SCORE</span><b id="impactScore"></b></div>
        <div class="scout-metric"><span>GROWTH POTENTIAL</span><b id="growthPotential"></b></div>
        <div class="scout-metric"><span>KEY STRENGTHS</span><div id="keyStrengths" class="strengths"></div></div>
        <div class="scout-metric"><span>PLAY STYLE</span><div id="traits" class="strengths"></div></div>
      </div>
    </article>

    <div id="profileStack" class="profile-stack"></div>
  </section>
</main>

<script src="js/data.js"></script><script src="js/common.js"></script><script src="js/player-v62.js"></script>
</body></html>
